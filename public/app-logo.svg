<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#16161E"/>
      <stop offset="100%" stop-color="#0F0F12"/>
    </radialGradient>

    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <circle cx="256" cy="256" r="140" fill="#6366F1" opacity="0.08" filter="blur(40px)"/>

  <g filter="url(#neonGlow)">
    <path d="M 360,160
             C 320,120 220,120 180,170
             C 140,220 160,260 210,280
             L 302,316
             C 360,340 370,390 332,440
             C 282,500 190,480 152,432"
          fill="none"
          stroke="url(#waveGrad)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <circle cx="180" cy="170" r="8" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="256" cy="243" r="6" fill="#818CF8" opacity="0.7"/>
    <circle cx="332" cy="440" r="8" fill="#FFFFFF" opacity="0.9"/>
  </g>
</svg>
